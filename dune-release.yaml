spack:

  config:
    deprecated: true

  include:

  # DUNE
  - git: https://github.com/DUNE/dune-release-configs
    branch: phlex
    paths:
    - included_yaml/gcc-15-toolchain.yaml
    - included_yaml/dune-packages.yaml
    - included_yaml/dune-specs.yaml

  specs:
    - $specs_dune

  concretizer:
    unify: true

  packages:
    all:
      providers:
        libc:
        - glibc
        'zlib-api:':
        - zlib
      variants:
      - generator=ninja
      - build_type=Release
      - cxxstd=20
      target:
      - x86_64_v3
