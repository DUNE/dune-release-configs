spack:

  config:
    deprecated: true

  include:

  # DUNE
  - git: https://github.com/DUNE/dune-release-configs
    branch: main
    paths:
    - included_yaml/dune-packages.yaml
    - included_yaml/dune-specs.yaml

  # LArSoft
  - git: https://github.com/LArSoft/larsoft-release-configs
    tag: larsoft-10.11.01
    paths:
    - included_yaml/larsoft-packages.yaml
    - included_yaml/larsoft-specs.yaml

  # NuSoftHEP
  - git: https://github.com/NuSoftHEP/nusofthep-release-configs
    tag: nusofthep-3.17.01
    paths:
    - included_yaml/nusofthep-packages.yaml
    - included_yaml/nusofthep-specs.yaml

  # art
  - git: https://github.com/art-framework-suite/art-release-configs
    tag: art-3.14.04
    paths:
    - included_yaml/gcc-12-toolchain.yaml
    - included_yaml/packages-art.yaml
    - included_yaml/specs-art.yaml

  # FIFE
  - git: https://github.com/fnal-fife/fife-release-configs
    branch: main
    paths:
    - included_yaml/fife_packages.yaml
    - included_yaml/fife_specs.yaml

  specs:
    - $specs_dune
    - $specs_larsoft
    - $specs_nusofthep
    - $specs_art
    - $fife_specs

  upstreams:
    cvmfs-larsoft:
      install_tree: /cvmfs/larsoft.opensciencegrid.org/spack-fnal-v1.1.0/spack_env/opt/spack

  concretizer:
    unify: true
    reuse:
      from:
      - type: environment
        path: /cvmfs/larsoft.opensciencegrid.org/spack-fnal-v1.1.0/spack_env/var/spack/environments/larsoft-v10_11_01-unified-cuda-python-3_9-trimmed

  packages:
    all:
      providers:
        libc:
        - glibc
        'zlib-api:':
        - zlib
      variants:
      - generator=ninja
      - build_type=Release
      - cxxstd=17
      target:
      - x86_64_v3
